# .github/workflows/elpais_digest.yml
#
# Ejecuta el bot dos veces al día (hora de España peninsular):
#   - Mañana: briefing de noticias + tiempo + artículos de columnistas
#   - Tarde:  deporte + Bitcoin + podcast de Jabois
#
# GitHub Actions usa UTC (con ~30min de margen por retrasos de cola):
#   6:30 UTC → ~8:30-9:00 CEST (verano) / ~7:30-8:00 CET (invierno)
#  20:00 UTC = 22:00 CEST (verano) / 21:00 CET (invierno)

name: BlitzBrief Daily Digest

on:
  schedule:
    # Mañana: 6:30 UTC → 8:30 verano / 7:30 invierno
    # (margen de ~30min para retrasos de GitHub Actions)
    - cron: "30 6 * * *"
    # Tarde: 20:00 UTC → 22:00 verano / 21:00 invierno
    - cron: "0 20 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - morning
          - evening

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: .elpais_seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "flag=--${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 6 * * *" ]; then
            echo "flag=--morning" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Run digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python elpais_telegram_bot.py ${{ steps.mode.outputs.flag }}
