# .github/workflows/elpais_digest.yml
#
# Ejecuta el bot cada mañana (hora de España peninsular).
# GitHub Actions usa UTC: 7:00 UTC = 9:00 CEST (verano) / 8:00 CET (invierno).
# Un solo cron para evitar notificaciones duplicadas.

name: BlitzBrief Daily Digest

on:
  schedule:
    # 7:00 UTC → 9:00 en verano, 8:00 en invierno
    - cron: "0 7 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python elpais_telegram_bot.py
