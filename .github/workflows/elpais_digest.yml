# .github/workflows/elpais_digest.yml
#
# Ejecuta el bot cada mañana a las 9:00 (hora de España peninsular).
# GitHub Actions usa UTC: 9:00 CET = 8:00 UTC (invierno) / 7:00 UTC (verano).
# Programamos ambas horas para cubrir el cambio horario.

name: Vigía Daily Digest

on:
  schedule:
    # 8:00 UTC = 9:00 CET (invierno, oct-mar)
    - cron: "0 8 * * *"
    # 7:00 UTC = 9:00 CEST (verano, mar-oct)
    - cron: "0 7 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python elpais_telegram_bot.py
