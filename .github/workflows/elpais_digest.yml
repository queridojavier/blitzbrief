# .github/workflows/elpais_digest.yml
#
# Ejecuta el bot cada mañana a las 7:00 (hora de España peninsular, UTC+1/+2).
# GitHub Actions usa UTC, así que 7:00 CET = 6:00 UTC (invierno) / 5:00 UTC (verano).
# Usamos 6:00 UTC como compromiso; ajusta si quieres más precisión estacional.

name: El País Daily Digest

on:
  schedule:
    # Todos los días a las 6:00 UTC (≈ 7:00-8:00 hora España)
    - cron: "0 6 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python elpais_telegram_bot.py
